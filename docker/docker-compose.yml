# Docker Compose for VisionPilot microservices

services:
  redis:
    image: "redis:alpine"
    container_name: "visionpilot_redis"
    ports:
      - "6379:6379"
    networks:
      - visionpilot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  object_detection:
    build:
      context: ..
      dockerfile: docker/dockerfiles/object_detection/Dockerfile
    container_name: "visionpilot_object_detection"
    environment:
      - MODEL_PATH=/models/object_detection/object_detection.pt
      - PYTHONUNBUFFERED=1
    ports:
      - "5777:5777"
    volumes:
      - ../models/object_detection:/models/object_detection:ro
    networks:
      - visionpilot_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5777/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  traffic_light_detection:
    build:
      context: ..
      dockerfile: docker/dockerfiles/traffic_light_detection/Dockerfile
    container_name: "visionpilot_traffic_light_detection"
    environment:
      - MODEL_PATH=/models/traffic_light/traffic_light_detection.pt
      - PYTHONUNBUFFERED=1
    ports:
      - "6777:6777"
    volumes:
      - ../models/traffic_light:/models/traffic_light:ro
    networks:
      - visionpilot_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6777/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  sign_detection:
    build:
      context: ..
      dockerfile: docker/dockerfiles/sign_detection/Dockerfile
    container_name: "visionpilot_sign_detection"
    environment:
      - MODEL_PATH=/models/traffic_sign/traffic_sign_detection.pt
      - PYTHONUNBUFFERED=1
    ports:
      - "7777:7777"
    volumes:
      - ../models/traffic_sign:/models/traffic_sign:ro
    networks:
      - visionpilot_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  sign_classification:
    build:
      context: ..
      dockerfile: docker/dockerfiles/sign_classification/Dockerfile
    container_name: "visionpilot_sign_classification"
    environment:
      - MODEL_PATH=/models/traffic_sign/traffic_sign_classification.h5
      - PYTHONUNBUFFERED=1
    ports:
      - "8777:8777"
    volumes:
      - ../models/traffic_sign:/models/traffic_sign:ro
    networks:
      - visionpilot_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8777/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  yolop:
    build:
      context: ..
      dockerfile: docker/dockerfiles/yolop/Dockerfile
    container_name: "visionpilot_yolop"
    environment:
      - MODEL_PATH=/models/yolop/yolop.pt
      - PYTHONUNBUFFERED=1
    ports:
      - "9777:9777"
    volumes:
      - ../models/yolop:/models/yolop:ro
    networks:
      - visionpilot_net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9777/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  visionpilot_net:
    driver: bridge